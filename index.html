<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HarmonyMap</title>
    <!-- Phosphor Icons for modern light icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Main dynamic content container -->
        <main id="main-content"></main>

        <!-- Bottom Navigation Bar (Hidden by default on Splash/Auth) -->
        <nav id="bottom-nav" style="display: none;">
            <a href="#/" class="nav-item active" data-route="/">
                <i class="ph ph-house"></i>
                <span>Home</span>
            </a>
            <a href="#/map" class="nav-item" data-route="/map">
                <i class="ph ph-map-pin"></i>
                <span>Map</span>
            </a>
            <a href="#/games" class="nav-item" data-route="/games">
                <i class="ph ph-game-controller"></i>
                <span>Games</span>
            </a>
            <a href="#/events" class="nav-item" data-route="/events">
                <i class="ph ph-calendar-star"></i>
                <span>Events</span>
            </a>
            <a href="#/profile" class="nav-item" data-route="/profile">
                <i class="ph ph-user"></i>
                <span>Profile</span>
            </a>
        </nav>
    </div>

    <!-- Application Views loaded globally -->
    <script src="js/views/splash.js"></script>
    <script src="js/views/onboarding.js"></script>
    <script src="js/views/auth.js"></script>
    <script src="js/views/home.js"></script>
    <script src="js/views/map.js"></script>
    <script src="js/views/locationDetail.js"></script>
    <script src="js/views/games.js"></script>
    <script src="js/views/events.js"></script>
    <script src="js/views/profile.js"></script>
    
    <!-- Main Application Router -->
    <script src="js/app.js"></script>
</body>
</html>
